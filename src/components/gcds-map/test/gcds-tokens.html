<!DOCTYPE html>
<html lang="en">

<head>
  <title>GCDS Tokens Integration Test</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="/build/gcds-map.esm.js"></script>
  <!-- Load GCDS CSS to provide design tokens on :root -->
  <link rel="stylesheet" href="/gcds/gcds.css">
  <style>
    html { height: 100% }
    body { height: inherit }
    * { margin: 0; padding: 0; }
  </style>
</head>

<body>
  <gcds-map style="width: 500px; height: 500px;" projection="CBMTILE" zoom="2" lat="45.5"
    lon="-75.2" controls>
    <map-layer label="Test Layer" checked>
      <map-meta name="projection" content="CBMTILE"></map-meta>
      <map-meta name="zoom" content="min=1,max=5,value=0"></map-meta>
      <map-meta name="cs" content="gcrs"></map-meta>
      <map-meta name="extent" content="zoom=0,top-left-column=0,top-left-row=0,bottom-right-column=5,bottom-right-row=5"></map-meta>
      <map-feature zoom="2">
        <map-properties>
          <h2>Test Feature</h2>
          <p>Feature for popup testing</p>
        </map-properties>
        <map-geometry cs="tilematrix">
          <map-polygon>
            <map-coordinates>11 11 12 11 12 12 11 12</map-coordinates>
          </map-polygon>
        </map-geometry>
      </map-feature>
    </map-layer>
  </gcds-map>
</body>

</html>
